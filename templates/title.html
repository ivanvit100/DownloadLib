<div id="bookContainer" style="overflow:hidden; margin-bottom:10px;">
    <img id="cover" src="" alt="cover" style="display:none; float:left; width:80px; height:auto; margin-right:10px;">
    <div id="description" style="color:#ddd; font-size:13px; line-height:1.3; min-height:48px;"></div>
</div>
<div id="releaseDate"></div>

<div id="translatorContainer">
    <label for="translatorSelect">Перевод:</label>
    <select id="translatorSelect"></select>
</div>

<div id="chapterRangeContainer">
    <div id="chapterLabelsRow">
        <div id="chapterFromLabel">от</div>
        <div id="chapterToLabel">до</div>
    </div>
    <div id="chapterSelectRow">
        <select id="chapterFromSelect"></select>
        <select id="chapterToSelect"></select>
    </div>
</div>

<div id="splitModeContainer">
    <label for="maxSizeInput">Макс. размер части (МБ):</label>
    <input id="maxSizeInput" type="number" min="1" max="9999" step="1" value="200">
</div>

<div id="rateLimitContainer">
    <label>Запросов в минуту: </label>
    <input id="rateLimitInput" type="number" min="2" max="200" step="1" value="85">
</div>

<div id="formatContainer">
    <label for="formatSelector">Формат: </label>
    <select id="formatSelector"></select>
</div>

<div id="fileInputContainer">
    <input type="file" id="fileInput" accept=".pdf,.epub,.fb2">
    <button id="customFileBtn">Загрузить файл для обновления</button>
</div>

<div id="downloadInfoPanel"></div>
<button id="downloadBtn">Скачать книгу</button>
<div id="status"></div>
<progress id="progress" value="0" max="100"></progress>

<div id="downloadControls">
    <div id="btnRow">
        <button id="pauseBtn">Пауза</button>
    </div>
    <button id="stopBtn">Завершить</button>
</div>
