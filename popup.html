<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <link rel="stylesheet" href="css/ui.css">
    </head>
    <body>
        <div id="container">
            <div id="logoHeader">
                <img id="siteLogo" src="icons/logo1.png" alt="Icon" style="display:block; margin: 0 auto;">
                <span id="historyBtn" title="История загрузок">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
                    </svg>
                </span>
            </div>
            <div id="logoInfo" style="text-align:center; color:#bdbdbd; font-size:12px; white-space:pre-wrap; margin-bottom:8px; margin-top:6px;"></div>

            <div id="error" class="hidden"></div>
            <div id="success" class="hidden"></div>
            <div id="view"></div>

            <script src="lib/jszip.min.js"></script>
            <script src="lib/html2pdf.min.js"></script>

            <!-- Browser API adapter -->
            <script src="core/BrowserApi.js"></script>

            <!-- Core -->
            <script src="core/EventBus.js"></script>
            <script src="core/RateLimiter.js"></script>
            <script src="core/Storage.js"></script>
            <script src="core/DownloadHistory.js"></script>
            <script src="core/DownloadManager.js"></script>
            <script src="core/MangaPatcher.js"></script>

            <!-- Services -->
            <script src="services/ServiceRegistry.js"></script>

            <!-- Exporters -->
            <script src="exporters/ExporterRegistry.js"></script>

            <!-- UI -->
            <script src="ui/TemplateLoader.js"></script>
            <script src="ui/HistoryController.js"></script>
            <script src="ui/PopupController.js"></script>

            <script type="module" src="app.js"></script>
        </div>
    </body>
</html>
